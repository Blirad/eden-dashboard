<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eden Command — Agent Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base:    #0d0b1e;
      --bg-surface: rgba(255,255,255,0.05);
      --bg-hover:   rgba(255,255,255,0.08);
      --border:     rgba(255,255,255,0.10);
      --border-glow: rgba(160,130,255,0.25);
      --text-primary:   #f0ecff;
      --text-secondary: rgba(240,236,255,0.55);
      --text-muted:     rgba(240,236,255,0.30);
      --status-running: #f0c93a;
      --status-done:    #4ade80;
      --status-waiting: rgba(240,236,255,0.30);
      --status-error:   #f87171;
      --accent:     #a082ff;
      --accent-dim: rgba(160,130,255,0.15);
      --font-ui:   'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-ui);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── HEADER ─── */
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,11,30,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .header-brand {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.08em;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .running-badge {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--status-running);
      background: rgba(240,201,58,0.12);
      border: 1px solid rgba(240,201,58,0.25);
      border-radius: 99px;
      padding: 3px 10px;
    }

    .refresh-timer {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      transition: color 0.3s;
      cursor: pointer;
      user-select: none;
    }

    .refresh-timer:hover { color: var(--text-secondary); }
    .refresh-timer.flash { color: var(--accent); }

    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-secondary);
      font-size: 14px;
      padding: 2px 7px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      line-height: 1.4;
    }
    .refresh-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ─── CONTENT ─── */
    .dashboard-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    /* ─── SECTION ─── */
    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.10em;
      color: var(--text-muted);
      margin-bottom: 14px;
      padding: 0 4px;
    }

    .section + .section { margin-top: 32px; }

    /* ─── LOADING STATE ─── */
    .loading-state {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 13px;
    }

    .loading-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(160,130,255,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── AGENT GRID ─── */
    .agent-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    @media (min-width: 480px) {
      .agent-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
    }

    @media (min-width: 768px) {
      .agent-grid { grid-template-columns: repeat(3, 1fr); gap: 16px; }
    }

    @media (min-width: 1100px) {
      .agent-grid { grid-template-columns: repeat(4, 1fr); }
    }

    /* ─── AGENT CARD ─── */
    .agent-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      position: relative;
      overflow: hidden;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      cursor: default;
    }

    .agent-card:hover {
      background: var(--bg-hover);
      transform: translateY(-1px);
    }

    .agent-card[data-status="running"] {
      border-left-color: var(--status-running);
      background: linear-gradient(135deg, rgba(240,201,58,0.06) 0%, var(--bg-surface) 60%);
    }

    .agent-card[data-status="done"] {
      border-left-color: var(--status-done);
    }

    .agent-card[data-status="idle"] {
      opacity: 0.65;
      border-left-color: rgba(255,255,255,0.15);
    }

    .agent-card[data-status="error"] {
      border-left-color: var(--status-error);
      background: linear-gradient(135deg, rgba(248,113,113,0.06) 0%, var(--bg-surface) 60%);
    }

    /* pulse dot for running */
    .agent-card[data-status="running"]::after {
      content: '';
      position: absolute;
      top: 14px;
      right: 14px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--status-running);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%   { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(240,201,58,0.5); }
      50%  { opacity: 0.6; transform: scale(1.3); box-shadow: 0 0 0 6px rgba(240,201,58,0); }
      100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(240,201,58,0); }
    }

    .agent-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
      gap: 8px;
    }

    .agent-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      flex-shrink: 0;
    }

    .agent-status-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 2px 7px;
      border-radius: 99px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .agent-card[data-status="running"] .agent-status-badge {
      color: var(--status-running);
      background: rgba(240,201,58,0.12);
      border: 1px solid rgba(240,201,58,0.2);
    }
    .agent-card[data-status="done"] .agent-status-badge {
      color: var(--status-done);
      background: rgba(74,222,128,0.12);
      border: 1px solid rgba(74,222,128,0.2);
    }
    .agent-card[data-status="idle"] .agent-status-badge {
      color: var(--text-muted);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .agent-card[data-status="error"] .agent-status-badge {
      color: var(--status-error);
      background: rgba(248,113,113,0.12);
      border: 1px solid rgba(248,113,113,0.2);
    }

    .agent-task {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.55;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 2em;
    }

    .agent-task.no-task {
      color: var(--text-muted);
      font-style: italic;
    }

    .agent-card-divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 10px;
    }

    .agent-last-commit {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .commit-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .commit-message {
      font-size: 11px;
      color: var(--text-secondary);
      font-family: var(--font-mono);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .commit-time {
      font-size: 10px;
      color: var(--text-muted);
    }

    .agent-no-commit {
      font-size: 11px;
      color: var(--text-muted);
      font-style: italic;
    }

    /* ─── DEPLOY LINKS ─── */
    .deploy-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .deploy-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .deploy-item:hover {
      border-color: var(--border-glow);
      background: var(--bg-hover);
    }

    .deploy-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 130px;
      flex-shrink: 0;
    }

    .deploy-env {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      background: var(--accent-dim);
      padding: 1px 7px;
      border-radius: 99px;
    }

    .deploy-url {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .deploy-arrow {
      font-size: 15px;
      color: var(--accent);
      flex-shrink: 0;
      transition: transform 0.15s;
    }

    .deploy-item:hover .deploy-arrow { transform: translate(2px, -2px); }

    /* ─── NEXT UP ─── */
    .next-up-section { margin-top: 32px; }

    .next-up-card {
      background: var(--bg-surface);
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: relative;
    }

    .next-up-card::before {
      content: '';
      position: absolute;
      left: 0; top: 12px; bottom: 12px;
      width: 3px;
      background: var(--accent);
      border-radius: 99px;
    }

    .next-up-agent {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 72px;
    }

    .next-up-agent .agent-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .next-up-task {
      flex: 1;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    .next-up-eta {
      font-size: 12px;
      color: var(--accent);
      font-family: var(--font-mono);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .empty-state {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      padding: 20px 0;
    }

    /* ─── QUEUE ─── */
    .queue-section { margin-top: 32px; }

    .queue-count {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-muted);
      margin-left: 6px;
      font-family: var(--font-mono);
    }

    .queue-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-surface);
      margin-bottom: 8px;
      transition: border-color 0.2s;
    }

    .queue-item:hover { border-color: var(--border-glow); }

    .queue-item.blocked { opacity: 0.5; }

    .queue-index {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      font-family: var(--font-mono);
      min-width: 22px;
      padding-top: 1px;
    }

    .queue-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .queue-main {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }

    .queue-agent {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap;
    }

    .queue-task {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .queue-dep {
      font-size: 11px;
      color: var(--text-muted);
    }

    .queue-dep.independent { color: var(--status-done); opacity: 0.8; }

    .queue-blocked-label {
      font-size: 10px;
      color: var(--status-waiting);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 99px;
      padding: 1px 7px;
      margin-left: 6px;
    }

    /* ─── FOOTER ─── */
    .dashboard-footer {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 20px 20px 32px;
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      border-top: 1px solid var(--border);
      margin-top: 32px;
    }

    .footer-dot { opacity: 0.4; }

    /* ─── SECTION spacing ─── */
    .section { margin-top: 32px; }
    .section:first-child { margin-top: 0; }

    /* ─── UPDATED AT ─── */
    .updated-at-badge {
      font-size: 10px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="dashboard-header">
    <div class="header-brand">🌌 EDEN COMMAND</div>
    <div class="header-meta">
      <span class="running-badge" id="running-count">실행중 0</span>
      <span class="updated-at-badge" id="updated-at-badge"></span>
      <span class="refresh-timer" id="refresh-timer">⟳ 30s</span>
      <button class="refresh-btn" id="refresh-btn" title="지금 바로 갱신">🔄</button>
    </div>
  </header>

  <div class="dashboard-content">

    <!-- AGENT GRID -->
    <div class="section">
      <p class="section-title">🤖 에이전트 현황</p>
      <div class="agent-grid" id="agent-grid">
        <div class="loading-state">
          <div class="loading-spinner"></div>
          <span>데이터 로딩 중...</span>
        </div>
      </div>
    </div>

    <!-- NEXT UP -->
    <div class="section next-up-section">
      <p class="section-title">▶ NEXT UP</p>
      <div id="next-up-container">
        <div class="loading-state"><div class="loading-spinner"></div><span>데이터 로딩 중...</span></div>
      </div>
    </div>

    <!-- QUEUE -->
    <div class="section queue-section">
      <p class="section-title">≡ QUEUE <span class="queue-count" id="queue-count"></span></p>
      <div id="queue-container">
        <div class="loading-state"><div class="loading-spinner"></div><span>데이터 로딩 중...</span></div>
      </div>
    </div>

    <!-- DEPLOY LINKS -->
    <div class="section">
      <p class="section-title">🚀 배포</p>
      <div class="deploy-list" id="deploy-list">
        <div class="loading-state">
          <div class="loading-spinner"></div>
          <span>데이터 로딩 중...</span>
        </div>
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <footer class="dashboard-footer">
    <span>Last fetch <time id="last-updated">--:--:--</time></span>
    <span class="footer-dot">·</span>
    <span>⟳ 30초마다 자동 새로고침</span>
  </footer>

  <script>
    // ─── UTILS ──────────────────────────────────────────────
    function esc(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function formatRelativeTime(isoStr) {
      if (!isoStr) return null;
      try {
        const d = new Date(isoStr);
        if (isNaN(d.getTime())) return isoStr;
        const diffMs = Date.now() - d.getTime();
        const diffMin = Math.round(diffMs / 60000);
        if (diffMin < 1) return '방금 전';
        if (diffMin < 60) return `${diffMin}분 전`;
        const h = Math.floor(diffMin / 60);
        const m = diffMin % 60;
        return m > 0 ? `${h}시간 ${m}분 전` : `${h}시간 전`;
      } catch { return isoStr; }
    }

    function formatUpdatedAt(isoStr) {
      if (!isoStr) return '';
      try {
        const d = new Date(isoStr);
        const hh = String(d.getHours()).padStart(2, '0');
        const mm = String(d.getMinutes()).padStart(2, '0');
        const ss = String(d.getSeconds()).padStart(2, '0');
        return `${hh}:${mm}:${ss}`;
      } catch { return ''; }
    }

    function nowTime() {
      return new Date().toTimeString().slice(0, 8);
    }

    // ─── RENDER ─────────────────────────────────────────────
    const STATUS_LABEL = {
      running: '🟡 실행중',
      done:    '✅ 완료',
      idle:    '⏸ 대기',
      error:   '❌ 오류'
    };

    const ORDER = { running: 0, error: 1, done: 2, idle: 3 };

    function renderAgentCards(agents) {
      const grid = document.getElementById('agent-grid');
      if (!agents || agents.length === 0) {
        grid.innerHTML = '<div class="loading-state"><span>에이전트 데이터 없음</span></div>';
        return;
      }

      const sorted = [...agents].sort((a, b) =>
        (ORDER[a.status] ?? 9) - (ORDER[b.status] ?? 9)
      );

      grid.innerHTML = sorted.map(agent => {
        const taskHtml = agent.currentTask
          ? `<div class="agent-task">${esc(agent.currentTask)}</div>`
          : `<div class="agent-task no-task">대기 중</div>`;

        const relTime = formatRelativeTime(agent.lastCommitTime);
        const commitHtml = agent.lastCommit
          ? `<div class="agent-card-divider"></div>
             <div class="agent-last-commit">
               <span class="commit-label">최근 커밋</span>
               <span class="commit-message">${esc(agent.lastCommit)}</span>
               ${relTime ? `<span class="commit-time">${relTime}</span>` : ''}
             </div>`
          : `<div class="agent-card-divider"></div>
             <div class="agent-last-commit">
               <span class="agent-no-commit">커밋 없음</span>
             </div>`;

        return `
          <article class="agent-card" data-status="${esc(agent.status)}" data-agent-id="${esc(agent.id)}">
            <div class="agent-card-header">
              <span class="agent-status-badge">${STATUS_LABEL[agent.status] ?? agent.status}</span>
              <span class="agent-name">${esc(agent.emoji)} ${esc(agent.name)}</span>
            </div>
            ${taskHtml}
            ${commitHtml}
          </article>`;
      }).join('');

      const runningCount = agents.filter(a => a.status === 'running').length;
      document.getElementById('running-count').textContent = `실행중 ${runningCount}`;
    }

    function renderNextUp(nextTask) {
      const container = document.getElementById('next-up-container');
      if (!nextTask) {
        container.innerHTML = `<p class="empty-state">현재 대기 중인 작업 없음</p>`;
        return;
      }
      container.innerHTML = `
        <div class="next-up-card">
          <div class="next-up-agent">
            <span>${esc(nextTask.agentEmoji || '')}</span>
            <span class="agent-name">${esc(nextTask.agentName)}</span>
          </div>
          <div class="next-up-task">${esc(nextTask.task || nextTask.taskName || '')}</div>
          ${nextTask.eta ? `<div class="next-up-eta">~${esc(nextTask.eta)}</div>` : ''}
        </div>`;
    }

    function renderQueue(queue) {
      const container = document.getElementById('queue-container');
      const countEl = document.getElementById('queue-count');
      if (!queue || queue.length === 0) {
        countEl.textContent = '';
        container.innerHTML = `<p class="empty-state">모든 작업이 완료되었거나 실행 중입니다</p>`;
        return;
      }
      countEl.textContent = `(${queue.length})`;
      container.innerHTML = queue.map((item, i) => {
        const depHtml = item.dependsOn
          ? `<div class="queue-dep">─ ${esc(item.dependsOn)} 완료 후${item.blocked ? '<span class="queue-blocked-label">선행 작업 대기 중</span>' : ''}</div>`
          : `<div class="queue-dep independent">─ 독립 실행 가능</div>`;
        return `
          <div class="queue-item ${item.blocked ? 'blocked' : ''}">
            <span class="queue-index">${String(item.order || i + 1).padStart(2, '0')}</span>
            <div class="queue-body">
              <div class="queue-main">
                <span class="queue-agent">${esc(item.agentEmoji || '')} ${esc(item.agentName)}</span>
                <span class="queue-task">${esc(item.task || item.taskName || '')}</span>
              </div>
              ${depHtml}
            </div>
          </div>`;
      }).join('');
    }

    function renderDeployLinks(deployUrl) {
      const container = document.getElementById('deploy-list');
      const links = [
        { name: 'Momentor', env: 'production', url: deployUrl || 'https://fourpillars-eosin.vercel.app' },
        { name: 'Agent Dashboard', env: 'local', url: window.location.href }
      ];

      container.innerHTML = links.map(link => `
        <a class="deploy-item" href="${esc(link.url)}" target="_blank" rel="noopener">
          <div class="deploy-name">${esc(link.name)} <span class="deploy-env">${esc(link.env)}</span></div>
          <div class="deploy-url">${esc(link.url)}</div>
          <span class="deploy-arrow">↗</span>
        </a>`).join('');
    }

    function renderAll(data) {
      renderAgentCards(data.agents);
      renderNextUp(data.nextTask);
      renderQueue(data.queue);
      renderDeployLinks(data.deployUrl);

      // updatedAt 표시
      const updatedAt = document.getElementById('updated-at-badge');
      if (data.updatedAt) {
        const t = formatUpdatedAt(data.updatedAt);
        updatedAt.textContent = t ? `갱신 ${t}` : '';
      }

      // 마지막 fetch 시각
      document.getElementById('last-updated').textContent = nowTime();
    }

    function showLoadingError() {
      const msg = '<div class="loading-state"><span>데이터 로딩 중...</span></div>';
      document.getElementById('agent-grid').innerHTML = msg;
      document.getElementById('deploy-list').innerHTML = msg;
    }

    // ─── DATA FETCH ─────────────────────────────────────────
    async function fetchStatus() {
      try {
        const res = await fetch('https://raw.githubusercontent.com/Blirad/eden-dashboard/main/data/status.json?_=' + Date.now());
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        renderAll(data);
      } catch (err) {
        console.warn('[dashboard] status.json 로드 실패:', err.message);
        showLoadingError();
      }
    }

    // ─── REFRESH TIMER ──────────────────────────────────────
    const REFRESH_INTERVAL = 30;
    let countdown = REFRESH_INTERVAL;

    function flashTimer() {
      const el = document.getElementById('refresh-timer');
      el.classList.add('flash');
      setTimeout(() => el.classList.remove('flash'), 1000);
    }

    function tick() {
      const el = document.getElementById('refresh-timer');
      if (el) el.textContent = `⟳ ${countdown}s`;
      countdown--;
      if (countdown < 0) {
        countdown = REFRESH_INTERVAL;
        fetchStatus();
        flashTimer();
      }
    }

    document.getElementById('refresh-timer').addEventListener('click', () => {
      countdown = REFRESH_INTERVAL;
      fetchStatus();
      flashTimer();
    });

    document.getElementById('refresh-btn').addEventListener('click', () => {
      countdown = REFRESH_INTERVAL;
      fetchStatus();
      flashTimer();
    });

    // ─── INIT ───────────────────────────────────────────────
    fetchStatus();
    setInterval(tick, 1000);
  </script>
</body>
</html>
